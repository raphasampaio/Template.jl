name: Template Setup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize package
        run: |
          # Get package name from repo name (strip .jl suffix if present)
          REPO_NAME="${{ github.event.repository.name }}"
          PACKAGE_NAME="${REPO_NAME%.jl}"
          echo "Package name: $PACKAGE_NAME"

          # Generate UUID
          UUID=$(uuidgen)
          echo "Generated UUID: $UUID"

          # Replace UUID placeholder in Project.toml
          sed -i "s/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/$UUID/g" Project.toml

          # Replace Template with package name in files
          sed -i "s/Template/$PACKAGE_NAME/g" Project.toml
          sed -i "s/Template/$PACKAGE_NAME/g" src/Template.jl

          # Rename src/Template.jl to src/$PACKAGE_NAME.jl
          mv src/Template.jl "src/$PACKAGE_NAME.jl"

      - name: Delete this workflow
        run: rm .github/workflows/Setup.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initialize package"
          git push
