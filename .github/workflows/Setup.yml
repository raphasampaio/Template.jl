name: Template Setup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate UUID and replace placeholder
        run: |
          UUID=$(uuidgen)
          echo "Generated UUID: $UUID"
          sed -i "s/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/$UUID/g" Project.toml

      - name: Delete this workflow
        run: rm .github/workflows/Setup.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initialize repository with unique UUID"
          git push
